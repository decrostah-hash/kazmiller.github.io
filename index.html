<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kazuhira Miller | Tactical Strategist</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background:
        url("https://i.imgur.com/2uQ2Y8T.png") center center / 500px no-repeat,
        radial-gradient(circle at top, #333 0, #000 55%);
      background-attachment: fixed;
      color: #fff;
      margin: 0;
    }

    h1, h2, h3, .logo, nav a {
      font-family: 'Oswald', sans-serif;
    }

    /* NAVIGATION */
    nav {
      display: flex;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      background: rgba(0,0,0,0.85);
      border-bottom: 1px solid #333;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      color: #d4b100;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      gap: 1.25rem;
    }

    .nav-links a {
      color: #fff;
      text-decoration: none;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-size: 0.9rem;
      position: relative;
    }

    .nav-links a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -3px;
      width: 0;
      height: 2px;
      background: #d4b100;
      transition: width 0.2s ease-out;
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    /* HERO */
    .hero {
      min-height: 90vh;
      display: flex;
      align-items: center;
      padding: 3rem 1.5rem;
      background:
        linear-gradient(135deg, rgba(0,0,0,0.8), rgba(0,0,0,0.6)),
        url("https://images.pexels.com/photos/799443/pexels-photo-799443.jpeg?auto=compress&cs=tinysrgb&w=1600")
        center/cover no-repeat;
    }

    .hero-inner {
      max-width: 900px;
    }

    .hero-tag {
      color: #f5e29b;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      font-size: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .hero-title {
      font-size: 3rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 1rem;
    }

    .hero-sub {
      max-width: 35rem;
      color: #ddd;
      margin-bottom: 2rem;
    }

    .btn {
      display: inline-block;
      padding: 0.75rem 1.75rem;
      border: 1px solid #d4b100;
      color: #d4b100;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      font-size: 0.8rem;
      text-decoration: none;
      transition: 0.2s ease-out;
      margin-right: 1rem;
    }

    .btn:hover {
      background: #d4b100;
      color: #000;
    }

    .btn-primary {
      background: #d4b100;
      color: #000;
    }
  </style>
</head>

<body>

  <!-- NAVIGATION -->
  <nav>
    <div class="logo">K. MILLER</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="training.html">Training</a>
      <a href="operations.html">Operations</a>
      <a href="gallery.html">Gallery</a>
      <a href="radio.html">Radio</a>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-inner">
      <div class="hero-tag">Diamond Dogs Tactical Command</div>
      <h1 class="hero-title">Kazuhira Miller</h1>
      <p class="hero-sub">
        Tactician, mentor, and survivor. Strategy isn’t luck — it’s discipline, awareness, and the will to keep moving when everything else falls apart.
      </p>

      <a href="about.html" class="btn btn-primary">About Miller</a>
      <a href="training.html" class="btn">Training Philosophy</a>
    </div>
  </section>

</body>
</html>
